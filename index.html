/* TOP IMAGE */
.hero-image{
    width:100%;

}

.hero-image img{
    width:100%;
    max-height:320px;

/* HEADER */

.product-gallery img{

    display:block;
}

/* CONTAINER */
.container{

    border-radius:10px;

}

}

/* PRODUCTS GRID */
.products-grid{

}

.product-item{

}

.product-item label{
    display:block;

}

/* INPUTS */
input, textarea{
    width:100%;
    padding:6px;
    margin-top:5px;
    background:#000;
    border:1px solid var(--gold);
    color:#fff;
    box-sizing:border-box;
}

textarea{

    resize:none;
}

/* BUTTON */
.buttons{

    text-align:center;
}

.whatsapp-btn{
    display:inline-block;
    background:#25d366;
    color:#fff;
    padding:12px 20px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

/* FOOTER */
footer{

    padding:20px;
    color:#999;

<script>
function sendOrder(){

    let rows = document.querySelectorAll(".product-item");
    let message = "🛒 *NEW ORDER - DEL SMILES KITCHEN & VARIETIES*%0A%0A";

    rows.forEach(row => {
        let item = row.querySelector(".item");
        let qty = row.querySelector(".qty");
        let spec = row.querySelector("textarea");
        let name = row.querySelector("label");

        if(item && item.checked){
            let itemName = name.innerText.trim();
            let quantity = qty.value || "1";
            let specValue = spec.value || "No specification";

            message += `✔ ${itemName}%0AQty: ${quantity}%0ASpec: ${specValue}%0A%0A`;
        }
    });

    let phone = "2348067515299";
    let url = `https://wa.me/${phone}?text=${message}`;

    window.open(url, "_blank");
}
</script>
