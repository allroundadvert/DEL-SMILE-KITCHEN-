<style>
body{

    background:#111;

:root{
    --gold:#d4af37;
}

header{
    background:linear-gradient(90deg,#111,var(--gold),#111);

    padding:25px 15px;
}

header h1{
    margin:0;
    color:#111;

}

header p{

}

/* TOP IMAGE ADDED */
.hero-image{

}

.hero-image img{
    width:100%;
    max-height:320px;
    object-fit:contain;
    display:block;
    background:#111;
}

.container{
    width:95%;
    max-width:1000px;
    margin:25px auto;
    background:#1a1a1a;
    border:1px solid var(--gold);
    border-radius:10px;
    padding:20px;
}

h2{
    text-align:center;
    color:var(--gold);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

table,th,td{
    border:1px solid var(--gold);
}

th{
    background:var(--gold);
    color:#111;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    background:#111;
}

input, textarea{
    padding:6px;
    background:#000;
    border:1px solid var(--gold);
    color:#fff;
    width:100%;
    box-sizing:border-box;
}

textarea{
    height:60px;
    resize:none;
}

.buttons{
    margin-top:20px;
    text-align:center;
}

.whatsapp-btn{
    display:inline-block;
    background:#25d366;
    color:#fff;
    padding:12px 20px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:20px;
    color:#999;
}
</style>
</head>
